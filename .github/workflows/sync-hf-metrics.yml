name: Sync HF Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync Hugging Face metrics
        run: python sync_hf_metrics.py

      - name: Commit and push updated metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add badges/*.json hf_metrics_snapshot.json hf_metrics_history.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: sync Hugging Face metrics"
          git push origin main
